{% extends "base.html" %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Survival Chart</h2>

<canvas id="chart"></canvas>

<script>
    const chartLabels = {{ labels | tojson }};
    const chartValues = {{ values | tojson }};

    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: chartLabels,
            datasets: [{
                label: 'percentage',
                data: chartValues,
            }]
        },
        options: {
            indexAxis: 'y',
            backgroundColor: chartValues.map(v => v >= 0 ? '#4CAF50' : '#FF5252'),
            scales: {
                x: {
                    beginAtZero: true,
                    max: 1,
                    min: -1
                }
            }
        }
    });
</script>

{% endblock %}
