{% extends "base.html" %}
{% block title %}Start{% endblock %}

{% block content %}
<style>
body{
    background-image: linear-gradient(rgba(24, 26, 73, 0.45), rgba(24, 26, 73, 0.45)), url("/static/background.gif");
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
}
</style>
        <div id="hold" class="aaa">
            <h1>
                Register
            </h1>
            <form action="/auth/register" method="POST">
                <h3>Username:</h3>
                <input class="a" type="text" name="username" required>
                <br>
                <br>
                <h3>Password:</h3>
                <input class="a" type=password name="password" required>
                <br>
                <br>
                <input class="b" type="submit" name="sub1" value="Register">
            </form>
            <br>
            <br>
            <!-- <h5> {{t}} </h5> -->
            <br>
            <br>
            <div>
                <p style="font-size: 110%; color: white;"> If you already have an account, click the button below to login. </p>
                <a href="{{url_for('auth.login_get')}}"> <button class="b">Login</button> </a>
            </div>
        </div>
        <br>
        <br>

    <script>
    window.addEventListener('load', () => {
        if(document.querySelector('#hold') !== null){
            window.sessionStorage.setItem('Hold', 'displayed');
        }
    })
    if (window.sessionStorage.getItem('Hold')) {
        document.querySelector('#hold').classList.remove('aaa')
    }
    </script>
{% endblock %}
