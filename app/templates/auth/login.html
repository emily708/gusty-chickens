<html>
    <head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>LOGIN PAGE</title>
	<style>
	    body{
                background-color: black;
         	color: #3d251d;
         	font-family: "Silkscreen", sans-serif;
         	background-repeat: no-repeat;
         	background-size: 100vw 100vh;
            }
            .hold{
         	margin-top: 10vh;
         	text-align: center;
         	margin-left: 10vw;
         	margin-right: 10vw;
         	padding-top: 10vh;
         	color: white;
            }
            h1{
         	font-size: 600%
            }
            .a{
         	color: black;
         	font-family: "Silkscreen", sans-serif;
            }
            .b{
         	padding-top: 0.5vh;
         	padding-bottom: 0.5vh;
         	padding-left: 1vw;
         	padding-right: 1vw;
         	background-color: white;
         	border: none;
         	border-radius: 6px;
         	color: black;
            }
            .b:hover{
         	background-color: #C7C7C7;
         	color: black;
            }
        </style>
    </head>
    <body>
	<div class="hold">
            <h1>
                Login
            </h1>
            <br>
            <form action="/auth/login" method="POST">
                <h3>Username:</h3>
                <input class="a" type="text" name="username" required>
                <br>
                <br>
                <h3>Password:</h3>
                <input class="a" type=password name="password" required>
                <br>
                <br>
                <input class="b" type="submit" name="sub1" value="Login">
            </form>
            <br>
            <br>
            <!-- <h5> {{t}} </h5> -->
            <br>
            <br>
            <div>
                <p style="font-size: 110%; color: white;"> If you don't have an account, click the button below to register. </p>
                <a href="{{url_for('auth.register_get')}}"> <button class="b">Register</button> </a>
            </div>
        </div>
        <br>
        <br>
    </body>

    <script>
    </script>
</html>
