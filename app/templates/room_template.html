{% extends "base.html" %}
{% block title %}{% endblock %}
{% block content %}
<nav class="navbar navbar-expand bg-dark mb-4" data-bs-theme="dark">
  <ul class="navbar-nav me-auto">
    <li class="nav-item">
      <a class="nav-link text-light" href="{{ url_for('game.map_get') }}">View Map | Moves: {{ game["moves"] }}</a>
    </li>
  </ul>
  <ul class="navbar-nav mx-auto">
    <li class="nav-item">
      <a class="nav-link text-light">
        {% block room %}
        {% endblock %}
      </a>
    </li>
  </ul>
  <ul class="navbar-nav ms-auto">
    <li class="nav-item">
      <a class="nav-link text-light" href="{{ url_for('game.end_get') }}">End Game</a>
    </li>
    <li class="nav-item">
      <a class="nav-link text-light" href="{{ url_for('auth.logout_get') }}">Log Out</a>
    </li>
  </ul>
</nav>
{% block inner %}
{% endblock %}
{% endblock %}
