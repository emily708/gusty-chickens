{% extends "base.html" %}
{% block title %}Start{% endblock %}

{% block content %}
<h1 class="center"> Let's Titanic! </h1>
<h3 class="center2" id="blink">
  <a href="{{url_for('login')}}">
    <button class="button">&lt; press to start &gt;</button>
  </a>
</h3>
<script>
  var blink = document.getElementById('blink');
  setInterval(function(){blink.style.opacity = (blink.style.opacity == 0 ? 1 : 0);}, 600);
</script>
{% endblock %}
