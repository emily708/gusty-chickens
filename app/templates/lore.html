{% block content %}
<style>
#bg{
    background-image: linear-gradient(rgba(24, 26, 73, 0.45), rgba(24, 26, 73, 0.45)), url("/static/ocean.png");
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    position: absolute;
    opacity: 1;
    	 z-index: -10000;
    background-position: 0 -300px;
}
#hold{
    opacity: 0;
    height: 1;
    overflow: hidden;
}
.anim{
	animation: appear 2s ease;
}
.anim2{
	animation: black 2s ease;
}
.anim3{
	animation: appear 2s ease 2s forwards;
	opacity: 0;
}
@keyframes black {
    from{
        opacity: 1;
    }
    to{
        opacity: 0;
    }
}
@keyframes appear {
    from{
        opacity: 0;
    }
    to{
        opacity: 1;
    }
}
.temp{
    display: none;
}
.temp2{
    opacity: 1;
}
         a{
         color: white;
         font-size: 150%;
         text-decoration: none;
         }
a:hover{
	color: red;
}
</style>

<div id="bg" class="anim"></div>
	<div id="container">
	<div class="box">
            <p> &lt; system &gt;</p>
            <p id="first"><br></p>

            <button class="button1" id="play"> <img class="img" src="/static/play.png" alt="play"> </button>
         </div>
	</div>

{% endblock %}
