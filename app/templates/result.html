{% extends "base.html" %}
{% block title %}Result{% endblock %}

{% block content %}
<style>
body{
    text-align: center;
    	 backdrop-filter: blur(6px);
       width: 100%;
    	 height: 100%;
    	 background-image: url("/static/ocean.png");
       background-repeat: no-repeat;
       background-size: cover;
    	 background-attachment: fixed;
     }
</style>
<h2 style="font-size: 200%; margin-top: 0; padding-top: 40px;">Game Results</h2>
<br>
<div>
<div style="display: inline-block; height: 70vh; width: 40vw; margin-right: 160px;">
<h3>Overall Survival Comparison</h3>
<canvas id="summaryChart"></canvas>
</div>
<div style="display: inline-block; height: 70vh; width: 40vw;">
<h3>Comparison by Passenger</h3>
<select id="passengerSelect">
    <option value="">Select Passenger</option>
</select>
<canvas id="passengerChart"></canvas>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const summaryData = {{ final | tojson }};
    const passengers = {{ passengers | tojson }};
    Chart.defaults.color = '#fff';
    Chart.defaults.borderColor = '#fff';
    const ctx = document.getElementById('summaryChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Actual', 'Game'],
            datasets: [{
                label: 'Survival Rate',
                data: [
                    summaryData.actual_survival_rate,
                    summaryData.game_survival_rate
                ],
                backgroundColor: '#ffffff',
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1
                }
            }
        }
    });

    const select = document.getElementById("passengerSelect");

    passengers.forEach((p, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.text = p.name;
        select.appendChild(option);
    });

    const ctx2 = document.getElementById('passengerChart').getContext('2d');
    
    let passengerChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Actual', 'Game'],
            datasets: [{
                label: 'Outcome',
                data: [0, 0],
                backgroundColor: '#ffffff',
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1,
                }
            }
        }
    })

    select.addEventListener("change", function() {
        const p = passengers[this.value];
        if (!p) return;

        const real = p.survived === 1 ? 1 : 0;
        const game = p.outcome === "survived" ? 1 : 0;

        passengerChart.data.datasets[0].data = [real, game];
        passengerChart.update();
    });

</script>

{% endblock %}
