{% extends "base.html" %}
{% block title %}Result{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<style>
body{
    text-align: center;
    	 backdrop-filter: blur(6px);
       width: 100%;
    	 height: 100%;
    	 background-image: url("/static/ocean.png");
       background-repeat: no-repeat;
       background-size: cover;
    	 background-attachment: fixed;
     }
select {
    color: white;
    background-color: grey !important;  
}
.card {
    background-color: transparent;
    border-color: transparent;
    color: white;
}
.card * {
    background-color: transparent;
    border-color: transparent;
    color: white;
}
</style>
<nav class="navbar navbar-expand bg-dark mb-4" data-bs-theme="dark">
  <ul class="navbar-nav me-auto">
    <li class="nav-item">
      <a class="nav-link text-light" href="{{ url_for('load_get') }}">New Game</a>
    </li>
  </ul>
  <ul class="navbar-nav ms-auto">
    <li class="nav-item">
      <a class="nav-link text-light" href="{{ url_for('auth.logout_get') }}">Log Out</a>
    </li>
  </ul>
</nav>
<h2 style="font-size: 200%; margin-top: 0; padding-top: 40px; color:white">Game Results</h2>
<div class="container">
  <div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                Comparison by Passenger
            </div>
            <div class="card-body">
                <select id="passengerSelect" class="form-select">
                    {% for passenger in passengers %}
                    <option value="{{ loop.index }}">{{ passenger["name"] }}</option>
                    {% endfor %}
                </select>
                <br>
                <div>
                    <canvas id="passengerChart" style="height: 50vh;"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                Overall Survival Comparison
            </div>
            <div class="card-body">
                <canvas id="summaryChart" style="height: 50vh;"></canvas>
            </div>
        </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const summaryData = {{ final | tojson }};
    const passengers = {{ passengers | tojson }};
    Chart.defaults.color = '#fff';
    Chart.defaults.borderColor = '#fff';
    const ctx = document.getElementById('summaryChart').getContext('2d');


    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Actual', 'Game'],
            datasets: [{
                label: 'Survival Rate',
                data: [
                    summaryData.actual_survival_rate,
                    summaryData.game_survival_rate
                ],
                backgroundColor: '#ffffff',
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1
                }
            }
        }
    });

    const select = document.getElementById("passengerSelect");
    const ctx2 = document.getElementById('passengerChart').getContext('2d');
    
    console.log(Object.keys(passengers[0]["odds"]));

    function convert(passenger) {
        odds = passenger["odds"]
        data = [];
        for (const [key, val] of Object.entries(odds)) {
            data.push(val['percentage']);
        }
        data[8] = (odds["total"])
        data.push(passenger["survived"]);
        return data;
    }

    keys = Object.keys(passengers[0]["odds"]);
    keys.push("survived");
    
    let passengerChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: keys,
            datasets: [{
                label: 'percentages',
                data: convert(passengers[0]),
                backgroundColor: '#ffffff',
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1,
                }
            }
        }
    })

    select.addEventListener("change", function() {
        passengerChart.data.datasets[0].data = convert(passengers[this.value]),
        console.log(passengerChart.data.datasets[0].data);
        passengerChart.update();
    });

</script>

{% endblock %}
